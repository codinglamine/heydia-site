<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Sign in · heydia</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="styles.css">

<style>
  .auth-wrap{min-height:100dvh;display:grid;place-items:center;padding:24px;position:relative;z-index:1}
  .auth-wrap::before{content:"";position:absolute;left:0;right:0;top:0;height:560px;z-index:-1;pointer-events:none;
    background:radial-gradient(120% 70% at 50% -20%,#5e7bff 0%,#aebfff 18%,#dde4ff 34%,rgba(245,246,248,0) 56%)}
  .auth-card{width:100%;max-width:440px;max-height:92vh;overflow:auto;background:var(--paper);border:1px solid var(--line);
    border-radius:26px;padding:34px 32px;box-shadow:var(--shadow-lg);text-align:center}
  .auth-card.wide{max-width:520px}
  .auth-card .word{justify-content:center;font-size:26px;margin-bottom:16px}
  .auth-card h1{font-family:var(--display);font-weight:500;font-size:26px;letter-spacing:-.01em;margin-bottom:6px}
  .auth-card .sub{color:var(--soft);font-size:14.5px;margin-bottom:20px;line-height:1.5}
  .seg{display:flex;background:rgba(18,20,25,.05);border-radius:12px;padding:4px;margin-bottom:18px}
  .seg button{flex:1;border:none;background:none;cursor:pointer;padding:.6em;border-radius:9px;font-size:14px;color:var(--soft);font-weight:600;transition:.18s}
  .seg button.on{background:var(--ink);color:#fff}
  .lbl{display:block;text-align:left;font-size:11.5px;color:var(--soft);font-weight:600;margin:12px 3px 5px}
  .fld{width:100%;background:#fff;border:1px solid var(--line-2);border-radius:13px;padding:12px 14px;font-size:14.5px;color:var(--ink);outline:none;font-family:var(--sans)}
  select.fld{appearance:none;-webkit-appearance:none}
  .fld:focus{border-color:var(--brand)}
  .stack{display:flex;flex-direction:column;gap:2px}
  .row2{display:flex;gap:10px}.row2>div{flex:1}
  .chips2{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-start}
  .gchip{padding:.55em .95em;border-radius:999px;border:1px solid var(--line-2);background:#fff;font-size:13px;cursor:pointer;color:var(--soft);transition:.15s}
  .gchip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .auth-card .btn{width:100%;justify-content:center;margin-top:16px}
  .or{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--faint);font-size:12px;text-transform:uppercase;letter-spacing:.1em}
  .or::before,.or::after{content:"";flex:1;height:1px;background:var(--line)}
  .msg{font-size:13px;margin:8px 0 0;min-height:18px}
  .msg.err{color:#d83a52}.msg.ok{color:#1d9a6c}
  .gbtn{display:flex;align-items:center;justify-content:center;gap:10px}
  .back{display:inline-block;margin-top:16px;color:var(--faint);font-size:13px;border:none;background:none;cursor:pointer}
  .back:hover{color:var(--ink)}
  .connect-grid{display:flex;flex-wrap:wrap;gap:26px 16px;justify-content:center;margin:10px 0 6px}
  .conn.sel{outline:3px solid var(--ink);outline-offset:2px}
  .conn.sel::after{content:"✓";position:absolute;top:-7px;right:-7px;width:19px;height:19px;border-radius:50%;background:var(--ink);color:#fff;font-size:11px;font-weight:700;display:grid;place-items:center;z-index:3}
  .steps{display:flex;gap:6px;justify-content:center;margin-bottom:18px}
  .steps i{width:22px;height:4px;border-radius:2px;background:var(--line-2)}
  .steps i.on{background:var(--ink)}
</style>
</head>

// ── 1. Auth (sign in / create account) ──────────────────────────────────────
function viewAuth(mode = "login") {
  card.classList.remove("wide");
  card.innerHTML = wordHTML +
    '<h1>' + (mode === "register" ? "Create your account" : "Welcome back") + "</h1>" +
    '<p class="sub">' + (mode === "register" ? "Two minutes to set up your heydia." : "Sign in to pick up where you left off.") + "</p>" +
    '<div class="seg"><button data-m="login" class="' + (mode === "login" ? "on" : "") + '">Sign in</button>' +
    '<button data-m="register" class="' + (mode === "register" ? "on" : "") + '">Create account</button></div>' +
    '<div class="stack"><input class="fld" id="email" type="email" placeholder="Email" autocomplete="email">' +
    '<input class="fld" id="pw" type="password" placeholder="Password" autocomplete="' + (mode === "register" ? "new-password" : "current-password") + '" style="margin-top:10px"></div>' +
    (mode === "login" ? '<button class="back" id="forgot" style="margin-top:10px">Forgot password?</button>' : "") +
    '<p class="msg" id="msg"></p>' +
    '<button class="btn btn-primary btn-lg" id="go">' + (mode === "register" ? "Create account" : "Sign in") + "</button>" +
    '<div class="or">or</div>' +
    '<button class="btn btn-ghost" id="google"><span class="gbtn"><svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"/><path fill="#FBBC05" d="M5.84 14.1a6.6 6.6 0 0 1 0-4.2V7.06H2.18a11 11 0 0 0 0 9.88l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38z"/></svg>Continue with Google</span></button>' +
    '<a class="back" href="index.html">← Back to heydia.com</a>';
  card.querySelectorAll(".seg button").forEach((b) => b.onclick = () => viewAuth(b.dataset.m));
  const msg = (t, ok) => { const e = card.querySelector("#msg"); e.textContent = t || ""; e.className = "msg" + (t ? (ok ? " ok" : " err") : ""); };
  card.querySelector("#go").onclick = async () => {
    const email = card.querySelector("#email").value.trim(), pw = card.querySelector("#pw").value;
    if (!email || !pw) return msg("Enter your email and password.");
    card.querySelector("#go").disabled = true; msg("");
    try {
      if (mode === "register") {
        const { data, error } = await sb.auth.signUp({ email, password: pw });
        if (error) throw error;
        if (data.session) viewProfile();
        else { viewAuth("login"); card.querySelector("#msg") && msg(""); setTimeout(() => { const m = card.querySelector("#msg"); if (m) { m.textContent = "Account created — confirm via the email we sent, then sign in."; m.className = "msg ok"; } }, 0); }
      } else {
        const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
        if (error) throw error;
        (data.user?.user_metadata?.onboarded) ? finishDone(data.session) : viewProfile();
      }
    } catch (e) {
      console.error("[heydia auth]", e);
      const real = (e && (e.message || e.error_description || e.msg)) || "";
      // A network/CORS failure throws a bare TypeError ("Failed to fetch") or an empty {}.
      // The project itself is reachable, so this means THIS browser blocked the request.
      const netty = !real || real === "{}" || /failed to fetch|load failed|networkerror|fetch/i.test(real);
      const detail = (real && real !== "{}") ? real : (e ? (e.name || String(e)) : "");
      const msgText = (location.protocol === "file:")
        ? "Open this page over http (a local server or the live site), not as a file:// — Supabase blocks file:// pages."
        : netty
          ? ("Can't reach Supabase from this browser" + (detail ? " (" + detail + ")" : "") +
             ". A privacy extension (uBlock, Brave Shields) or your network is likely blocking supabase.co. Try another browser / disable shields, or just sign up in the app at heydia.onrender.com.")
          : real;
      msg(msgText);
      card.querySelector("#go").disabled = false;
    }
  };
  card.querySelector("#pw").onkeydown = (e) => { if (e.key === "Enter") card.querySelector("#go").click(); };
  const forgotBtn = card.querySelector("#forgot");
  if (forgotBtn) forgotBtn.onclick = async () => {
    const email = card.querySelector("#email").value.trim();
    if (!email) return msg("Enter your email above first, then tap forgot password.");
    try {
      const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: location.href.split("?")[0] });
      if (error) throw error;
      msg("Check your inbox for a reset link.", true);
    } catch (e) { msg((e && (e.message || e.error_description)) || "Couldn't send the reset email."); }
  };
  card.querySelector("#google").onclick = async () => {
    const { error } = await sb.auth.signInWithOAuth({ provider: "google", options: { redirectTo: location.href.split("?")[0], queryParams: { prompt: "select_account" } } });
    if (error) msg(error.message);
  };
}

// ── 2. About you ────────────────────────────────────────────────────────────
function viewProfile() {
  card.classList.add("wide");
  card.innerHTML = wordHTML + dots(0) +
    "<h1>Tell heydia about you</h1>" +
    '<p class="sub">So it can talk to you like a person, not a form.</p>' +
    '<div class="stack" style="text-align:left">' +
      '<label class="lbl">What should heydia call you?</label><input class="fld" id="pref" placeholder="e.g. Lamine">' +
      '<label class="lbl">Full name <span style="color:var(--faint)">(optional)</span></label><input class="fld" id="full" placeholder="Ahmadou Lamine">' +
      '<div class="row2"><div><label class="lbl">Age</label><input class="fld" id="age" type="number" min="13" max="120" placeholder="16"></div>' +
      '<div><label class="lbl">Gender</label><select class="fld" id="gender"><option value="">Prefer not to say</option><option>Female</option><option>Male</option><option>Non-binary</option><option>Other</option></select></div></div>' +
      '<div class="row2"><div><label class="lbl">Country</label><select class="fld" id="country">' + countryOpts + '</select></div>' +
      '<div><label class="lbl">City <span style="color:var(--faint)">(weather &amp; time)</span></label><input class="fld" id="city" placeholder="Paris"></div></div>' +
      '<label class="lbl">What do you do?</label><input class="fld" id="role" placeholder="Student, founder, designer…">' +
      '<label class="lbl">What should heydia help with?</label><div class="chips2" id="goals">' +
        GOALS.map((g) => '<button type="button" class="gchip" data-g="' + g + '">' + g + "</button>").join("") + "</div>" +
    "</div>" +
    '<button class="btn btn-primary btn-lg" id="next">Continue</button>' +
    '<button class="back" id="skip">Skip for now</button>';
  card.querySelectorAll(".gchip").forEach((b) => b.onclick = () => b.classList.toggle("on"));
  const collect = () => {
    draft.preferredName = card.querySelector("#pref").value.trim();
    draft.fullName = card.querySelector("#full").value.trim();
    draft.age = card.querySelector("#age").value.trim();
    draft.gender = card.querySelector("#gender").value;
    draft.city = card.querySelector("#city").value.trim();
    draft.country = card.querySelector("#country").value;
    draft.role = card.querySelector("#role").value.trim();
    draft.goals = [...card.querySelectorAll(".gchip.on")].map((b) => b.dataset.g);
  };
  card.querySelector("#next").onclick = () => { collect(); viewConnect(); };
  card.querySelector("#skip").onclick = () => { collect(); viewConnect(); };
}

// ── 3. Connect your world ────────────────────────────────────────────────────
function viewConnect() {
  card.classList.add("wide");
  const tiles = CONN.map(([n, c, p], i) =>
    '<button class="conn" data-i="' + i + '" style="background:' + c + '"><svg viewBox="0 0 24 24" width="25" height="25" fill="#fff"><path d="' + p + '"/></svg><span class="nm">' + n + "</span></button>").join("");
  card.innerHTML = wordHTML + dots(1) +
    "<h1>Connect your world</h1>" +
    '<p class="sub">Pick what heydia should run for you — your calendar, inbox, music and more. You authorise each one securely inside the app.</p>' +
    '<div class="connect-grid">' + tiles + "</div>" +
    '<button class="btn btn-primary btn-lg" id="done">Finish setup</button>' +
    '<button class="back" id="skip">I\'ll connect later</button>';
  card.querySelectorAll(".conn").forEach((b) => b.onclick = () => b.classList.toggle("sel"));
  const finish = () => { draft.connectors = [...card.querySelectorAll(".conn.sel")].map((b) => CONN[+b.dataset.i][0]); save(); };
  card.querySelector("#done").onclick = finish;
  card.querySelector("#skip").onclick = () => { draft.connectors = []; save(); };
}

async function save() {
  card.innerHTML = wordHTML + '<p class="sub" style="margin-top:10px">Saving your setup…</p>';
  try { await sb.auth.updateUser({ data: { ...draft, name: draft.preferredName || draft.fullName, onboarded: true } }); } catch (e) { /* keep going */ }
  const { data } = await sb.auth.getSession();
  finishDone(data.session);
}

// ── 4. Done ──────────────────────────────────────────────────────────────────
function finishDone(session) {
  if (APP_URL) { location.href = APP_URL; return; }
  card.classList.remove("wide");
  const name = session?.user?.user_metadata?.preferredName || session?.user?.user_metadata?.name || session?.user?.email?.split("@")[0] || "there";
  card.innerHTML = wordHTML +
    "<h1>You're all set, " + esc(name) + ".</h1>" +
    '<p class="sub" style="margin:8px 0 20px">Your account and preferences are saved. The heydia app opens here the moment it goes live — we\'ll email you the second your spot is up.</p>' +
    '<a class="btn btn-primary btn-lg" href="index.html">Back to heydia.com</a>' +
    '<button class="back" id="out">Sign out</button>';
  card.querySelector("#out").onclick = async () => { await sb.auth.signOut(); viewAuth("login"); };
}

// Boot: resume an existing session, else show auth.
sb.auth.getSession().then(({ data }) => {
  const s = data.session;
  if (!s) { viewAuth(new URLSearchParams(location.search).get("mode") === "register" ? "register" : "login"); return; }
  s.user?.user_metadata?.onboarded ? finishDone(s) : viewProfile();
});
</script>
<script src="cookies.js" defer></script>
</body>
</html>
